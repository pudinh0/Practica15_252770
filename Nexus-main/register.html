<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Registro | Nexus</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card fade-in">
            <img src="/assets/logo.png" alt="Nexus Logo" style="width: 80px; height: 80px; margin-bottom: 10px;">
            <h1>nexus</h1>
            <h2>Crea una cuenta</h2>
            <form id="register-form">
                <div class="form-group">
                    <input type="text" id="name" placeholder="Nombre completo" required>
                </div>
                <div class="form-group">
                    <input type="email" id="email" placeholder="Correo electrónico" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Contraseña nueva" required>
                </div>
                <button type="submit" class="btn btn-primary">Registrarte</button>
            </form>
            <a href="login.html" class="btn-link">¿Ya tienes cuenta? Inicia sesión</a>
        </div>
    </div>

    <script type="module" src="js/pages/register.js"></script>
</body>

</html>
